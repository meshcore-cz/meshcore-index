name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing CalVer tag to release, e.g. v2026.6.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Verify package version matches Git tag
        run: |
          tag_version="${{ github.event.inputs.tag || github.ref_name }}"
          npm_version="$(node -p "require('./package.json').version")"
          if [ "${tag_version#v}" != "$npm_version" ]; then
            echo "Version mismatch: Git tag is $tag_version, package.json is $npm_version"
            exit 1
          fi
          echo "package.json version $npm_version matches $tag_version"

      - name: Validate web data
        run: |
          npm ci
          npm test

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
