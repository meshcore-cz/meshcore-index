# Source: meshcore-dev/MeshCore variants/ikoka_handheld_nrf/platformio.ini
# Source: https://github.com/ndoo/ikoka-handheld-meshtastic-device
name: Ikoka Handheld nRF
vendorId: ikoka
kind: product
lifecycle: active
familyId: ikoka-handheld-nrf
official: true
aliases:
  - Ikoka Handheld Meshtastic Device
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52
    flashMb: 1
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '433'
        - '868'
        - '915'
        - '923'
      txPowerDbm: 33
      antenna: IPEX-1.0
  display:
    status: present
    technology: oled
    controller: SSD1306
    size: 0.96
    colors: monochrome
  gnss:
    status: none
  power:
    batterySupported: true
    charging: true
    solarInput: false
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
