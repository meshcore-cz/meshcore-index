# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://wiki.seeedstudio.com/XIAO_BLE/
name: Seeed Studio Xiao nRF52 WIO
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-xiao-wio
image: xiao_nrf52.svg
official: true
product_url: https://wiki.seeedstudio.com/XIAO_BLE/
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 1
  display:
    status: none
  gnss:
    status: none
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  physical:
    dimensionsMm:
      width: 21
      height: 17.8
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: none
