# Source: meshcore-dev/flasher.meshcore.io config.json
# Source: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
name: Seeed Studio Xiao S3 WIO
vendorId: seeed
kind: dev-board
lifecycle: active
familyId: seeed-xiao-s3-wio
image: xiao_esp32s3.svg
official: true
product_url: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
hardware:
  mcu:
    model: esp32-s3
    flashMb: 8
    psramMb: 8
  radios:
    - technology: lora
      chip: sx1262
  display:
    status: none
  gnss:
    status: none
  input:
    - type: button
      description: Boot
    - type: button
      description: Reset
  physical:
    dimensionsMm:
      width: 21
      height: 17.8
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
