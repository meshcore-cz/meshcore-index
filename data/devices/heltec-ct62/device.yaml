# Source: https://heltec.org/project/ht-ct62/
name: Heltec CT62
vendorId: heltec
kind: product
lifecycle: active
familyId: heltec-ct62
aliases:
  - Heltec CT62 (Capsule Sensor)
  - HT-CT62
product_url: https://heltec.org/project/ht-ct62/
datasheet: datasheet.pdf
official: true
description: >-
  Compact ESP32-C3 + SX1262 LoRa node module with integrated 2.4 GHz Wi-Fi,
  Bluetooth LE, and IPEX antenna sockets. Designed for low-power IoT use cases
  such as Meshtastic, MeshCore and LoRaWAN, the CT62 is a stamp-hole package
  with long-range LoRa connectivity and a minimal module footprint.
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - wifi
hardware:
  mcu:
    model: esp32-c3
    flashMb: 4
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '470'
        - '868'
        - '915'
      txPowerDbm: 21
      antenna: IPEX-1.0
  display:
    status: none
  gnss:
    status: none
  physical:
    dimensionsMm:
      width: 17.78
      height: 17.78
      depth: 2.8
    weightG: 2
interfaces:
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
