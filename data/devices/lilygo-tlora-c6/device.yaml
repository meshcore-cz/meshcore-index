# Source: meshcore-dev/MeshCore variants/lilygo_tlora_c6/platformio.ini
# Source: https://lilygo.cc/en-us/products/t-lora-c6
# Source: https://wiki.lilygo.cc/get_started/zh/LoRa_GPS/T-LoRa-C6/T-LoRa-C6.html
name: LilyGo T-LoRa C6
vendorId: lilygo
kind: product
lifecycle: active
familyId: lilygo-t-lora-c6
aliases:
  - LilyGo T-Lora C6
product_url: https://lilygo.cc/en-us/products/t-lora-c6
official: true
roles:
  - companion
  - repeater
  - room-server
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-c6
    flashMb: 4
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '868'
        - '915'
  display:
    status: none
  gnss:
    status: none
  input:
    - type: button
      description: BOOT
    - type: button
      description: RESET
  physical:
    dimensionsMm:
      width: 33
      height: 29
      depth: 6
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 ax
